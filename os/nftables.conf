#!/usr/sbin/nft -f
# PiLot OS - /etc/nftables.conf
# Minimal firewall: default DROP, allow only required services

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Allow established/related connections
        ct state established,related accept

        # Allow loopback
        iif "lo" accept

        # Allow ICMP (ping) for diagnostics
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # Allow SSH (tcp 22)
        tcp dport 22 accept

        # Allow PiLot Dashboard (tcp 80)
        tcp dport 80 accept

        # Allow PiLot Setup Wizard (tcp 8080)
        tcp dport 8080 accept

        # Log and drop everything else
        log prefix "[nftables-drop] " drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy accept;

        # Allow all outbound (needed for Tesla API, DHCP, DNS, NTP, updates)
    }
}
