<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}PiLot{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  {% block head %}{% endblock %}
</head>
<body>
  <!-- ======= Desktop Sidebar ======= -->
  <nav class="sidebar" aria-label="Main navigation">
    <div class="sidebar__logo">
      <svg class="sidebar__logo-icon" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
        <path d="M10 20 L16 10 L22 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="sidebar__logo-text">PiLot</span>
    </div>

    <ul class="sidebar__nav">
      <li>
        <a href="/" class="sidebar__link{% if active == 'home' %} sidebar__link--active{% endif %}" data-nav>
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Home</span>
        </a>
      </li>
      <li>
        <a href="/efficiency" class="sidebar__link{% if active == 'efficiency' %} sidebar__link--active{% endif %}" data-nav>
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span>Efficiency</span>
        </a>
      </li>
      <li>
        <a href="/drives" class="sidebar__link{% if active == 'drives' %} sidebar__link--active{% endif %}" data-nav>
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <span>Drives</span>
        </a>
      </li>
      <li>
        <a href="/charging" class="sidebar__link{% if active == 'charging' %} sidebar__link--active{% endif %}" data-nav>
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
          <span>Charging</span>
        </a>
      </li>
      <li>
        <a href="/battery" class="sidebar__link{% if active == 'battery' %} sidebar__link--active{% endif %}" data-nav>
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="6" width="18" height="12" rx="2" ry="2"/>
            <line x1="23" y1="13" x2="23" y2="11"/>
          </svg>
          <span>Battery</span>
        </a>
      </li>
      <li>
        <a href="/vehicle" class="sidebar__link{% if active == 'vehicle' %} sidebar__link--active{% endif %}" data-nav>
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17m-2 0a2 2 0 104 0 2 2 0 10-4 0"/>
            <path d="M17 17m-2 0a2 2 0 104 0 2 2 0 10-4 0"/>
            <path d="M5 17H3v-6l2-5h9l4 5h1a2 2 0 012 2v4h-2"/>
            <path d="M9 17h6"/>
          </svg>
          <span>Vehicle</span>
        </a>
      </li>
      <li>
        <a href="/settings" class="sidebar__link{% if active == 'settings' %} sidebar__link--active{% endif %}" data-nav>
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          <span>Settings</span>
        </a>
      </li>
    </ul>

    <div class="sidebar__footer">
      <button class="sidebar__theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="sidebar__icon icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="sidebar__icon icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ======= Mobile Bottom Nav ======= -->
  <nav class="bottom-nav" aria-label="Mobile navigation">
    <a href="/" class="bottom-nav__link{% if active == 'home' %} bottom-nav__link--active{% endif %}" data-nav>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </a>
    <a href="/efficiency" class="bottom-nav__link{% if active == 'efficiency' %} bottom-nav__link--active{% endif %}" data-nav>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span>Efficiency</span>
    </a>
    <a href="/drives" class="bottom-nav__link{% if active == 'drives' %} bottom-nav__link--active{% endif %}" data-nav>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      <span>Drives</span>
    </a>
    <a href="/charging" class="bottom-nav__link{% if active == 'charging' %} bottom-nav__link--active{% endif %}" data-nav>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <span>Charging</span>
    </a>
    <a href="/battery" class="bottom-nav__link{% if active == 'battery' %} bottom-nav__link--active{% endif %}" data-nav>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="6" width="18" height="12" rx="2" ry="2"/>
        <line x1="23" y1="13" x2="23" y2="11"/>
      </svg>
      <span>Battery</span>
    </a>
  </nav>

  <!-- ======= Status Bar ======= -->
  <header class="status-bar">
    <div class="status-bar__vehicle">
      <span class="status-bar__name" id="vehicle-name">---</span>
      <span class="status-bar__state" id="vehicle-state">Offline</span>
    </div>
    <div class="status-bar__metrics">
      <div class="status-bar__metric">
        <span class="status-bar__metric-value" id="status-soc">--</span>
        <span class="status-bar__metric-unit">%</span>
      </div>
      <div class="status-bar__metric">
        <span class="status-bar__metric-value" id="status-range">--</span>
        <span class="status-bar__metric-unit">km</span>
      </div>
    </div>
    <div class="status-bar__connection" id="ws-status" title="WebSocket disconnected">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.55a11 11 0 0114.08 0"/>
        <path d="M1.42 9a16 16 0 0121.16 0"/>
        <path d="M8.53 16.11a6 6 0 016.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
  </header>

  <!-- ======= Main Content ======= -->
  <main class="main" id="content">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/vendor/chart.min.js"></script>
  <script src="/static/js/charts.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/ws.js"></script>
  <script src="/static/js/gauge.js"></script>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
